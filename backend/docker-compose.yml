version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: skyx-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: skyx
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: skyx_dev_password
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongodb.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skyx-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skyx-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:skyx_dev_password@mongodb:27017/skyx?authSource=admin
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - skyx-network
    command: npm run dev

volumes:
  mongodb_data:
    driver: local

networks:
  skyx-network:
    driver: bridge
